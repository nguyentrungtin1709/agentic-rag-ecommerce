services:
  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: agentic-rag-app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    networks:
      - agentic-rag
      - saleor-backend-tier
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      valkey:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Celery Worker ──────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: agentic-rag-celery-worker
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--queues=webhook,reindex,reindex_batches,cleanup", "--concurrency=4"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentic-rag
      - saleor-backend-tier
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: always

  # ── Celery Beat ────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: agentic-rag-celery-beat
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - agentic-rag
    depends_on:
      - celery-worker
    restart: always

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16.14-alpine
    container_name: agentic-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - agentic-rag
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Postgres metrics exporter (D17.2, D17.3) ─────────────────────────────
  # Reads POSTGRES_* from .env via the same ${...:-default} pattern the
  # postgres service above uses (D17.3). No new env vars.
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: agentic-rag-postgres-exporter
    environment:
      DATA_SOURCE_URI: "postgres:5432/${POSTGRES_DB:-app}?sslmode=disable"
      DATA_SOURCE_USER: ${POSTGRES_USER:-app}
      DATA_SOURCE_PASS: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "9187:9187"
    networks:
      - agentic-rag
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.1
    container_name: agentic-rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - agentic-rag
    restart: always

  # ── Valkey (Redis-compatible) ──────────────────────────────────────────────
  valkey:
    image: valkey/valkey:9.1.0-alpine
    container_name: agentic-rag-valkey
    volumes:
      - valkey_data:/data
    ports:
      - "6380:6379"
    networks:
      - agentic-rag
    restart: always
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Valkey metrics exporter (D17.1, D17.4) ─────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: agentic-rag-redis-exporter
    environment:
      REDIS_ADDR: redis://valkey:6379
    ports:
      - "9121:9121"
    networks:
      - agentic-rag
    depends_on:
      valkey:
        condition: service_healthy
    restart: always

  # ── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4.3.1-management-alpine
    container_name: agentic-rag-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"   # Prometheus metrics endpoint (Phase 17, D17.6)
    networks:
      - agentic-rag
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.0
    container_name: agentic-rag-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"   # Phase 17: accept remote_write from Alloy (D7)
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - agentic-rag
    depends_on:
      app:
        condition: service_healthy
    restart: always
  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:13.0.2
    container_name: agentic-rag-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    networks:
      - agentic-rag
    depends_on:
      - loki
    restart: always

  # ── Loki ───────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.2
    container_name: agentic-rag-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - agentic-rag
    restart: always

  # ── Grafana Alloy (D8: v1.17.0) ──────────────────────────────────────────
  # Unified collector for BOTH logs and metrics.
  # Phase 16 ships the log half (loki.source.docker -> loki.write).
  # Phase 17 will extend docker/alloy/config.alloy with prometheus.scrape.
  alloy:
    image: grafana/alloy:v1.17.0
    container_name: agentic-rag-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345"   # Alloy self-metrics / debug UI; not scraped in Phase 16
    networks:
      - agentic-rag
    depends_on:
      loki:
        condition: service_started
    restart: always

  # ── Admin UIs (profile: tools — opt-in, not started by default) ───────────
  # Start with:  docker compose --profile tools up -d
  # Stop with:   docker compose --profile tools down
  #
  # - Adminer        : PostgreSQL web UI          -> http://localhost:8081
  # - Redis Insight  : Valkey (Redis-compatible)  -> http://localhost:5540
  # - Qdrant native  : built-in dashboard         -> http://localhost:6333/dashboard
  # - RabbitMQ Mgmt  : already exposed by image   -> http://localhost:15672
  adminer:
    image: adminer:5.4.2-standalone
    container_name: agentic-rag-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
      ADMINER_AUTOLOGIN: "false"
    ports:
      - "8081:8080"
    networks:
      - agentic-rag
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools

  redis-insight:
    image: redis/redisinsight:3.4.2
    container_name: agentic-rag-redis-insight
    ports:
      - "5540:5540"
    networks:
      - agentic-rag
    depends_on:
      valkey:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - tools

networks:
  agentic-rag:
    name: agentic-rag
    driver: bridge
  # Attached to the Saleor stack so the API can deliver webhooks to the POD
  # Stylist app via the service name (http://app:8080).  Marked external
  # because it is owned by the saleor-platform compose project; do not
  # create or delete it from here.
  saleor-backend-tier:
    name: saleor-platform_saleor-backend-tier
    external: true

volumes:
  postgres_data:
    name: agentic-rag-postgres-data
  qdrant_data:
    name: agentic-rag-qdrant-data
  valkey_data:
    name: agentic-rag-valkey-data
  rabbitmq_data:
    name: agentic-rag-rabbitmq-data
  prometheus_data:
    name: agentic-rag-prometheus-data
  grafana_data:
    name: agentic-rag-grafana-data
  loki_data:
    name: agentic-rag-loki-data
  alloy_data:
    name: agentic-rag-alloy-data
