# docker/loki/local-config.yaml
# Phase 16 — Log pipeline (D5, D8, D9; tactical D16.1).
# Replaces the default local-config.yaml shipped with grafana/loki:3.7.2.
# Single-process mode; all state lives under /loki in the container.
# retention_period bounds the correlation_id label cardinality.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

limits_config:
  # D16.1 — 7-day retention. Bounds correlation_id label cardinality
  # without making short-window debugging impossible.
  retention_period: 168h
  # Allow structured metadata entries (used by Alloy stage.structured_metadata
  # for the `endpoint` field). Without this Loki rejects the push.
  allow_structured_metadata: true
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 24

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 1h
  delete_request_store: filesystem
