# RabbitMQ configuration for agentic-rag-ecommerce
#
# global_qos: Celery 5.x sets basic.qos with global=true (per-connection prefetch)
# when worker_prefetch_multiplier is configured.  RabbitMQ 4.x deprecated this
# AMQP flag.  Permit it here until Celery ships a per-channel QoS fix.
# Tracked upstream: https://github.com/celery/celery/issues/7106
deprecated_features.permit.global_qos = true
#
# management_metrics_collection: the rabbitmq_prometheus plugin (Phase 17,
# D17.6) relies on the management plugin's internal metrics collection,
# which is deprecated as of RabbitMQ 4.x.  Permit it here so the
# Prometheus exporter on :15692 continues to receive queue/exchange
# counters.  Revisit when RabbitMQ ships a replacement metric pipeline.
deprecated_features.permit.management_metrics_collection = true
#
# return_per_object_metrics: rabbitmq_prometheus 4.x emits queue/exchange
# metrics in totals mode by default (no `queue=`, `exchange=`, `vhost=`
# labels). Phase 18 dashboard panels I12 + I13 filter by `queue="webhook"`
# (history/18_0_1_DEPLOYMENT_FIXES.md, D18.12). Set to true so the
# standard /metrics endpoint carries the per-object labels needed for
# per-queue dashboards and alerts. With our 6 queues this adds single-
# digit KB per scrape — negligible.
prometheus.return_per_object_metrics = true
