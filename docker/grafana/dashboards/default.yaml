apiVersion: 1

providers:
  - name: pod-stylist
    orgId: 1
    folder: POD Stylist
    folderUid: pod-stylist
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
